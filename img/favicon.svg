<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="rgb(9,0,49)" stroke="#0188ff" stroke-width="3" filter="url(#glow)"/>
  <text x="50" y="67" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#0188ff" text-anchor="middle" filter="url(#glow)">K</text>
</svg>
